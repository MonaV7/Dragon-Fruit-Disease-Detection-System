<!DOCTYPE html>
<html lang="en">
<head>
    <title>Dragon Fruit AI — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:       #0c0f0e;
            --surface:  #141918;
            --border:   rgba(255,255,255,0.07);
            --pink:     #f0437a;
            --pink-glow:#f0437a55;
            --green:    #2ddf8a;
            --green-dim:#1a8a55;
            --text:     #e8ede9;
            --muted:    #6b7a6e;
            --error:    #ff6b6b;
        }

        html, body {
            height: 100%;
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        /* ── BACKGROUND ── */
        .bg-layer {
            position: fixed; inset: 0; z-index: 0;
            background:
                radial-gradient(ellipse 60% 70% at 20% 50%, rgba(240,67,122,0.12) 0%, transparent 60%),
                radial-gradient(ellipse 50% 60% at 80% 50%, rgba(45,223,138,0.07) 0%, transparent 55%);
        }

        /* Subtle dot grid */
        .bg-layer::after {
            content: '';
            position: absolute; inset: 0;
            background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
            background-size: 32px 32px;
        }

        /* Decorative fruit shapes */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(60px);
            pointer-events: none;
            z-index: 0;
        }
        .blob-1 {
            width: 320px; height: 320px;
            background: radial-gradient(circle, rgba(240,67,122,0.18), transparent 70%);
            top: -80px; left: -60px;
            animation: drift 8s ease-in-out infinite alternate;
        }
        .blob-2 {
            width: 240px; height: 240px;
            background: radial-gradient(circle, rgba(45,223,138,0.14), transparent 70%);
            bottom: -60px; right: 30%;
            animation: drift 10s ease-in-out 2s infinite alternate-reverse;
        }

        @keyframes drift {
            from { transform: translate(0,0) scale(1); }
            to   { transform: translate(20px, 15px) scale(1.05); }
        }

        /* ── LAYOUT ── */
        .page {
            position: relative; z-index: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            height: 100vh;
        }

        /* ── LEFT PANEL ── */
        .left {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 64px;
            border-right: 1px solid var(--border);
            animation: fadeUp 0.8s ease both;
        }

        .brand-tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(240,67,122,0.12);
            border: 1px solid rgba(240,67,122,0.25);
            border-radius: 100px;
            padding: 5px 14px;
            font-size: 11px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--pink);
            margin-bottom: 32px;
            width: fit-content;
        }

        .brand-tag::before {
            content: '';
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--pink);
            animation: pulse 2s ease infinite;
        }

        @keyframes pulse {
            0%,100% { opacity: 1; transform: scale(1); }
            50%      { opacity: 0.5; transform: scale(0.7); }
        }

        .left h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.4rem, 3.5vw, 3.2rem);
            line-height: 1.15;
            font-weight: 700;
            margin-bottom: 24px;
        }

        .left h1 em {
            font-style: italic;
            color: var(--pink);
        }

        .left p {
            font-size: 1rem;
            line-height: 1.75;
            color: var(--muted);
            max-width: 380px;
            margin-bottom: 48px;
        }

        /* Brand name */
        .brand-name {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.8rem, 4.5vw, 4.2rem);
            font-weight: 700;
            line-height: 1.05;
            margin-bottom: 20px;
            color: var(--text);
        }

        .brand-name span {
            color: var(--pink);
            font-style: italic;
        }

        /* Decorative fruit illustration */
        .fruit-art {
            margin-top: 52px;
            display: flex;
            align-items: center;
            gap: 16px;
            opacity: 0.35;
        }

        .fruit-art svg { width: 44px; height: 44px; }

        .fruit-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, var(--pink), transparent);
        }

        /* ── RIGHT PANEL ── */
        .right {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px;
            animation: fadeUp 0.8s ease 0.15s both;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 44px 40px;
            box-shadow: 0 0 0 1px var(--border), 0 40px 80px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        /* Top shine */
        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 20%; right: 20%;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(240,67,122,0.6), transparent);
        }

        .card-header {
            margin-bottom: 36px;
        }

        .card-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.7rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .card-header p {
            font-size: 0.875rem;
            color: var(--muted);
        }

        /* Error */
        .error-msg {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,107,107,0.1);
            border: 1px solid rgba(255,107,107,0.25);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.82rem;
            color: var(--error);
            margin-bottom: 20px;
        }

        /* Fields */
        .field {
            margin-bottom: 16px;
        }

        .field label {
            display: block;
            font-size: 0.75rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .field input {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 13px 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            color: var(--text);
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .field input::placeholder { color: #3a4a3e; }

        .field input:focus {
            border-color: rgba(240,67,122,0.5);
            box-shadow: 0 0 0 3px rgba(240,67,122,0.1);
        }

        /* Login button */
        .btn-login {
            width: 100%;
            margin-top: 8px;
            padding: 14px;
            background: linear-gradient(135deg, #f0437a, #c0205a);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 20px rgba(240,67,122,0.35);
        }

        .btn-login::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent);
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 28px rgba(240,67,122,0.45);
        }

        .btn-login:active { transform: translateY(0); }

        /* Register link */
        .register-link {
            margin-top: 24px;
            text-align: center;
            font-size: 0.82rem;
            color: var(--muted);
        }

        .register-link a {
            color: var(--green);
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .register-link a:hover { opacity: 0.75; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            .page { grid-template-columns: 1fr; overflow-y: auto; }
            .left  { display: none; }
            .right { padding: 32px 20px; height: 100vh; }
            html, body { overflow: auto; }
        }
    </style>
</head>
<body>

<div class="bg-layer"></div>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="page">

    <!-- LEFT -->
    <div class="left">
        <div class="brand-tag">AI-Powered Platform</div>

        <div class="brand-name">Dragon<br>Fruit <span>AI</span></div>

        <p>Smart disease detection powered by Deep Learning. Upload or capture images and get instant predictions.</p>

        <div class="fruit-art">
            <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
                <ellipse cx="22" cy="24" rx="13" ry="15" fill="#f0437a" opacity="0.8"/>
                <ellipse cx="22" cy="24" rx="8" ry="9" fill="#ffd6e5" opacity="0.6"/>
                <path d="M22 9 C22 9 18 3 22 1 C26 3 22 9 22 9Z" fill="#2ddf8a"/>
                <path d="M17 11 C17 11 11 8 13 4 C17 5 17 11 17 11Z" fill="#2ddf8a" opacity="0.7"/>
                <path d="M27 11 C27 11 33 8 31 4 C27 5 27 11 27 11Z" fill="#2ddf8a" opacity="0.7"/>
            </svg>
            <div class="fruit-line"></div>
        </div>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <div class="login-card">

            <div class="card-header">
                <h2>Welcome back</h2>
                <p>Sign in to your Dragon Fruit AI account</p>
            </div>

            {% if message %}
            <div class="error-msg">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6.5" stroke="#ff6b6b"/><path d="M7 4v4M7 9.5v.5" stroke="#ff6b6b" stroke-linecap="round"/></svg>
                {{ message }}
            </div>
            {% endif %}

            <form method="POST">

                <div class="field">
                    <label>Username</label>
                    <input type="text" name="username" placeholder="Enter your username" required>
                </div>

                <div class="field">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn-login">Sign In</button>

            </form>

            <p class="register-link">
                Don't have an account? <a href="/register">Create one →</a>
            </p>

        </div>
    </div>

</div>

</body>
</html>
